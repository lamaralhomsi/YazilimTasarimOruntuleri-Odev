name: C++ CI Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Compile
      # src klasöründeki TÜM .cpp dosyalarını derlemesi için *.cpp kullandık
      run: g++ -o test_app src/*.cpp 
      
    - name: Run Test
      # Uygulamanın en azından çalışıp çalışmadığını kontrol eder
      run: ./test_app
